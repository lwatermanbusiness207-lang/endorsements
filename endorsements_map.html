<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luke A. Waterman — Endorsements</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0f1c2e;
    --navy-mid: #162540;
    --navy-light: #1e3155;
    --blue: #3d7ebf;
    --blue-bright: #5a99d4;
    --gold: #c9a84c;
    --gold-light: #e2c97e;
    --slate: #4a5a6a;
    --muted: #64748b;
    --border: rgba(0,0,0,0.1);
    --card-bg: rgba(0,0,0,0.025);
    --card-hover: rgba(0,0,0,0.05);
    --white: #f0f4f8;
    --text: #1a2535;
  }

  body {
    background: #ffffff;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    min-height: 100vh;
  }

  header {
    padding: 2.5rem 3rem 1.5rem;
    border-bottom: 0.5px solid var(--border);
    display: flex; align-items: flex-end; justify-content: space-between;
    flex-wrap: wrap; gap: 1rem;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2rem; font-weight: 700;
    color: var(--navy);
    letter-spacing: -0.01em;
  }

  header h1 span { color: var(--gold); }

  header p {
    font-size: 13px; color: var(--muted);
    font-weight: 300; letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .page { max-width: 1100px; margin: 0 auto; padding: 2rem 2rem 4rem; }

  .section-label {
    font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.1em; color: var(--gold);
    font-weight: 500; margin-bottom: 1rem;
  }

  /* MAP */
  #map-section { margin-bottom: 0; }

  #legend {
    display: flex; gap: 20px; margin-bottom: 14px; flex-wrap: wrap;
  }

  .li {
    display: flex; align-items: center; gap: 7px;
    font-size: 12px; color: var(--muted);
  }

  .ld {
    width: 13px; height: 13px; border-radius: 2px;
  }

  #map-wrapper {
    background: #f5f7fa;
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    position: relative;
  }

  svg#map { width: 100%; height: auto; display: block; }

  .state-path {
    cursor: pointer;
    transition: opacity 0.12s, filter 0.12s;
  }

  .state-path:hover { opacity: 0.75; filter: brightness(1.15); }
  .state-path.active { filter: brightness(1.3); }

  /* TOOLTIP */
  #tip {
    position: fixed; display: none; z-index: 9999;
    background: #ffffff;
    border: 0.5px solid rgba(201,168,76,0.5);
    border-radius: 8px;
    padding: 8px 13px;
    pointer-events: none;
    font-size: 13px; font-weight: 500;
    color: var(--navy);
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  }

  #tip .tip-count {
    font-size: 11px; color: var(--gold);
    font-weight: 400; margin-left: 6px;
  }

  /* PANEL */
  #panel {
    display: none;
    margin-top: 1.5rem;
    animation: slideDown 0.22s ease;
  }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #panel-header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  #panel-state {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem; font-weight: 600;
    color: var(--navy);
  }

  #panel-state span {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 400;
    color: var(--gold); margin-left: 10px;
    text-transform: uppercase; letter-spacing: 0.06em;
  }

  #close-btn {
    font-size: 12px; color: var(--muted);
    cursor: pointer; padding: 5px 12px;
    border: 0.5px solid var(--border);
    border-radius: 6px;
    transition: background 0.15s, color 0.15s;
  }

  #close-btn:hover { background: var(--card-hover); color: var(--navy); }

  /* CANDIDATE CARDS */
  .cand-card {
    display: grid;
    grid-template-columns: 88px 1fr 1.8fr;
    border: 0.5px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 10px;
    background: var(--card-bg);
    transition: background 0.15s;
  }

  .cand-card:hover { background: var(--card-hover); }

  .cand-card.withdrawn {
    opacity: 0.45;
    filter: grayscale(0.6);
  }

  .withdrawn-badge {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--muted);
    font-weight: 500; margin-top: 4px;
    border: 0.5px solid var(--border);
    border-radius: 4px; padding: 2px 6px;
    display: inline-block;
  }

  .cand-photo {
    background: #f0f4f8;
    border-right: 0.5px solid var(--border);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 18px 10px; gap: 8px;
  }

  .avatar {
    width: 54px; height: 54px; border-radius: 50%;
    background: #dce6f0;
    border: 1.5px solid rgba(201,168,76,0.4);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 500;
    color: var(--gold);
    overflow: hidden; flex-shrink: 0;
  }

  .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

  .cand-pos {
    padding: 18px 16px;
    border-right: 0.5px solid var(--border);
    display: flex; flex-direction: column; justify-content: center; gap: 4px;
  }

  .pos-label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--gold);
    font-weight: 500;
  }

  .pos-name {
    font-size: 16px; font-weight: 500;
    color: var(--navy); line-height: 1.3;
    font-family: 'Playfair Display', serif;
  }

  .pos-detail {
    font-size: 12px; color: var(--muted); margin-top: 2px;
  }

  .cand-reason {
    padding: 18px 18px;
    display: flex; flex-direction: column; justify-content: center; gap: 5px;
  }

  .reason-label {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.07em; color: var(--slate);
    font-weight: 500;
  }

  .reason-text {
    font-size: 13px; color: var(--text);
    line-height: 1.6; font-weight: 300;
  }

  .no-end {
    font-size: 13px; color: var(--muted);
    font-style: italic; padding: 1rem 0;
  }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 2rem;
    font-size: 12px;
    color: var(--slate);
    border-top: 0.5px solid var(--border);
    letter-spacing: 0.03em;
  }

  @media (max-width: 600px) {
    .cand-card { grid-template-columns: 1fr; }
    .cand-photo { border-right: none; border-bottom: 0.5px solid var(--border); flex-direction: row; justify-content: flex-start; padding: 12px 16px; gap: 12px; }
    .cand-pos { border-right: none; border-bottom: 0.5px solid var(--border); }
    header { padding: 1.5rem; }
    .page { padding: 1.5rem 1rem 3rem; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Luke <span>A.</span> Waterman</h1>
    <p>Endorsements Map — 2026 Cycle</p>
  </div>
</header>

<div class="page">
  <div id="map-section">
    <div class="section-label">Click a state to view endorsements</div>
    <div id="legend">
      <div class="li"><div class="ld" style="background:#3d7ebf;"></div>Has endorsements</div>
      <div class="li"><div class="ld" style="background:#8fa8c4;"></div>No endorsements yet</div>
    </div>
    <div id="map-wrapper">
      <svg id="map" viewBox="0 0 960 600"></svg>
    </div>
  </div>

  <div id="panel">
    <div id="panel-header">
      <div id="panel-state"></div>
      <div id="close-btn" onclick="closePanel()">✕ close</div>
    </div>
    <div id="panel-body"></div>
  </div>
</div>

<footer>Luke A. Waterman &nbsp;·&nbsp; All views are personal endorsements</footer>

<div id="tip"></div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
<script>
/* =============================================
   ENDORSEMENTS DATA
   To add a state: copy a block and use the FIPS code.
   Full FIPS list is in the comment at the bottom.
   photo: null = initials avatar. Or put a URL: "https://..."
============================================= */
const DATA = {
  "21": {
    name: "Kentucky",
    candidates: [
      {
        name: "Thomas Massie",
        position: "U.S. House — 4th District",
        race: "2026 House Race",
        party: "Republican",
        reason: "Where do I even start? The man I aspire to be when I'm older. Thomas Massie has voted against unconstitutional spending bills, pushed to release the Epstein files, introduced legislation to kill vehicle kill switch technology, opposed the Iran war, and refused to rubber-stamp bloated budgets. Massie doesn't vote based on who's watching or who's threatening him. He votes on principle every single time, and that's exactly what Congress needs more of and exactly what I plan to do when the time comes. Kentucky's 4th deserves to keep him.",
        photo: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cc/Massie_Thomas_119th_Congress_%28cropped_2%29.jpg/250px-Massie_Thomas_119th_Congress_%28cropped_2%29.jpg"
      }
    ]
  },
  "30": {
    name: "Montana",
    candidates: [
      {
        name: "Tom Jandron",
        position: "U.S. Senate",
        race: "2026 Senate Race",
        party: "Libertarian",
        reason: "Tom Jandron is running to end unconstitutional wars, ban foreign lobbying, abolish corporate welfare, audit the Fed, return education to the states, and restore the Fourth Amendment, which are all things that I agree with. Basically, the Thomas Massie and Ron Paul we've been wanting more of in office. He's an Afghanistan veteran who actually lived the consequences of Washington's foreign policy decisions, and he's not afraid to say what most senators won't. Also draft Lindsey Graham.",
        photo: "https://montanafreepress.org/wp-content/uploads/2026/03/Tom-Jandron-Yellow.png"
      }
    ]
  },
  "23": {
    name: "Maine",
    candidates: [
      {
        name: "Owen McCarthy",
        position: "Governor",
        race: "2026 Gubernatorial Race",
        party: "Republican",
        reason: "Owen McCarthy wants to do a full review of every state program, justify it or cut it, simple as that. He wants to eliminate bloated positions, slash regulations killing small businesses, and has a realistic path to zero income tax by actually controlling spending instead of just talking about it. He's not taking PAC money, nobody owns him, and his whole approach works around a Democrat-controlled Legislature instead of pretending it doesn't exist, something that Jim Libby also understood. Given where Maine is right now and what the GOP field looks like, Owen McCarthy is the right call.",
        photo: "https://owenformaine.com/wp-content/uploads/2025/03/Owen-McCarthy-1024x932.png"
      },
      {
        name: "Jim Libby",
        position: "Governor",
        race: "2026 Gubernatorial Race",
        party: "Republican",
        reason: "Jim Libby was the most qualified candidate in this race with the right demeanor for where Maine was at the time. While a lot of the GOP candidates were running on radical ideas, we needed someone who could actually work the aisle in Augusta and get things done first. As a sitting state senator and tenured business professor at Thomas College, Jim had the experience, well-reasoned economic plans, and strong constitutional values including a solid Second Amendment record to do just that.",
        photo: "https://static.wixstatic.com/media/fe889a_1b1d19893c1544aaaf6341e8522f0745~mv2.jpg",
        withdrawn: true
      }
    ]
  }
};

/* STATE NAMES BY FIPS */
const NAMES = {
  "01":"Alabama","02":"Alaska","04":"Arizona","05":"Arkansas","06":"California",
  "08":"Colorado","09":"Connecticut","10":"Delaware","12":"Florida","13":"Georgia",
  "15":"Hawaii","16":"Idaho","17":"Illinois","18":"Indiana","19":"Iowa",
  "20":"Kansas","21":"Kentucky","22":"Louisiana","23":"Maine","24":"Maryland",
  "25":"Massachusetts","26":"Michigan","27":"Minnesota","28":"Mississippi",
  "29":"Missouri","30":"Montana","31":"Nebraska","32":"Nevada","33":"New Hampshire",
  "34":"New Jersey","35":"New Mexico","36":"New York","37":"North Carolina",
  "38":"North Dakota","39":"Ohio","40":"Oklahoma","41":"Oregon","42":"Pennsylvania",
  "44":"Rhode Island","45":"South Carolina","46":"South Dakota","47":"Tennessee",
  "48":"Texas","49":"Utah","50":"Vermont","51":"Virginia","53":"Washington",
  "54":"West Virginia","55":"Wisconsin","56":"Wyoming"
};

const tip = document.getElementById('tip');
let activePath = null;

function getInitials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
}

function closePanel() {
  document.getElementById('panel').style.display = 'none';
  if (activePath) { activePath.classList.remove('active'); activePath = null; }
}

function renderPanel(fips, pathEl) {
  if (activePath) activePath.classList.remove('active');
  activePath = pathEl;
  pathEl.classList.add('active');

  const entry = DATA[fips];
  const name = NAMES[fips] || fips;
  const count = entry ? entry.candidates.filter(c => !c.withdrawn).length : 0;

  const stateEl = document.getElementById('panel-state');
  stateEl.innerHTML = name + (count ? `<span>${count} endorsement${count > 1 ? 's' : ''}</span>` : '');

  const body = document.getElementById('panel-body');
  if (!entry || !entry.candidates.length) {
    body.innerHTML = `<div class="no-end">No endorsements for this state yet.</div>`;
  } else {
    body.innerHTML = entry.candidates.map(c => {
      const photoHTML = c.photo
        ? `<img src="${c.photo}" alt="${c.name}" />`
        : getInitials(c.name);
      const withdrawnBadge = c.withdrawn ? `<div class="withdrawn-badge">Withdrew from race</div>` : '';
      return `
        <div class="cand-card${c.withdrawn ? ' withdrawn' : ''}">
          <div class="cand-photo">
            <div class="avatar">${photoHTML}</div>
          </div>
          <div class="cand-pos">
            <div class="pos-label">${c.race}</div>
            <div class="pos-name">${c.name}</div>
            <div class="pos-detail">${c.position} &middot; ${c.party}</div>
            ${withdrawnBadge}
          </div>
          <div class="cand-reason">
            <div class="reason-label">${c.withdrawn ? 'Why I endorsed' : 'Why I endorse'}</div>
            <div class="reason-text">${c.reason}</div>
          </div>
        </div>`;
    }).join('');
  }

  const panel = document.getElementById('panel');
  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

async function draw() {
  const us = await d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json');
  const states = topojson.feature(us, us.objects.states);
  const mesh = topojson.mesh(us, us.objects.states, (a, b) => a !== b);
  const proj = d3.geoAlbersUsa().scale(1280).translate([480, 300]);
  const pathGen = d3.geoPath().projection(proj);
  const svg = d3.select('#map');

  svg.selectAll('path.state-path')
    .data(states.features)
    .join('path')
    .attr('class', 'state-path')
    .attr('d', pathGen)
    .attr('fill', d => {
      const fips = String(d.id).padStart(2, '0');
      return DATA[fips] ? '#3d7ebf' : '#8fa8c4';
    })
    .attr('stroke', 'none')
    .on('mousemove', function(event, d) {
      const fips = String(d.id).padStart(2, '0');
      const name = NAMES[fips] || '';
      const count = DATA[fips] ? DATA[fips].candidates.filter(c => !c.withdrawn).length : 0;
      tip.innerHTML = name + (count
        ? `<span class="tip-count">${count} endorsement${count > 1 ? 's' : ''}</span>`
        : '');
      tip.style.display = 'block';
      tip.style.left = (event.clientX + 14) + 'px';
      tip.style.top = (event.clientY - 8) + 'px';
    })
    .on('mouseleave', () => tip.style.display = 'none')
    .on('click', function(event, d) {
      const fips = String(d.id).padStart(2, '0');
      renderPanel(fips, this);
    });

  svg.append('path')
    .datum(mesh)
    .attr('fill', 'none')
    .attr('stroke', 'rgba(255,255,255,0.6)')
    .attr('stroke-width', '0.7')
    .attr('d', pathGen);
}

draw().catch(() => {
  d3.select('#map').append('text')
    .attr('x', 480).attr('y', 300)
    .attr('text-anchor', 'middle')
    .attr('font-size', 14)
    .attr('fill', '#6b7f96')
    .text('Map could not load — internet connection required');
});

/*
FIPS CODE REFERENCE — add any state using its code:
AL=01  AK=02  AZ=04  AR=05  CA=06  CO=08  CT=09  DE=10
FL=12  GA=13  HI=15  ID=16  IL=17  IN=18  IA=19  KS=20
KY=21  LA=22  ME=23  MD=24  MA=25  MI=26  MN=27  MS=28
MO=29  MT=30  NE=31  NV=32  NH=33  NJ=34  NM=35  NY=36
NC=37  ND=38  OH=39  OK=40  OR=41  PA=42  RI=44  SC=45
SD=46  TN=47  TX=48  UT=49  VT=50  VA=51  WA=53  WV=54
WI=55  WY=56
*/
</script>
</body>
</html>
